<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos por WhatsApp</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
        color: #333;
    }

    .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
    }

    .producto {
        margin: 10px 0;
        padding: 10px;
        border-bottom: 1px solid #ddd;
    }

    button {
        width: 100%;
        padding: 15px;
        background: green;
        color: white;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        margin-top: 20px;
        cursor: pointer;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Hacer Pedido</h1>

    <h2>🔥 Combos</h2>

    <div class="producto"><input type="checkbox" value="Salame + queso ($15000)"> Salame + queso - $15.000</div>
    <div class="producto"><input type="checkbox" value="2 salamines + queso ($12000)"> 2 salamines + queso - $12.000</div>
    <div class="producto"><input type="checkbox" value="Salame XXL + 2 quesos ($25000)"> Salame XXL + 2 quesos - $25.000</div>

    <h2>🥩 Individuales</h2>

    <div class="producto"><input type="checkbox" value="Salame ($10000)"> Salame - $10.000</div>
    <div class="producto"><input type="checkbox" value="Longaniza ($8000)"> Longaniza - $8.000</div>

    <h2>📍 Tus datos</h2>

    <input type="text" id="nombre" placeholder="Tu nombre">
    <input type="text" id="direccion" placeholder="Dirección">
    <input type="text" id="pago" placeholder="Forma de pago">

    <button onclick="enviarPedido()">Enviar por WhatsApp</button>
</div>

<script>
function enviarPedido() {
    let productos = document.querySelectorAll('input[type=checkbox]:checked');
    let mensaje = "Hola! Quiero hacer un pedido:%0A";

    productos.forEach(p => {
        mensaje += "- " + p.value + "%0A";
    });

    let nombre = document.getElementById("nombre").value;
    let direccion = document.getElementById("direccion").value;
    let pago = document.getElementById("pago").value;

    mensaje += "%0A Nombre: " + nombre;
    mensaje += "%0A Dirección: " + direccion;
    mensaje += "%0A Pago: " + pago;

    let telefono = "5491135575997"; // ← CAMBIAR POR EL NÚMERO DEL CLIENTE

    let url = "https://wa.me/" + telefono + "?text=" + mensaje;

    window.open(url, '_blank');
}
</script>

</body>
</html>
