<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos por WhatsApp</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #333;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

.producto {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 8px 0;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.producto input {
    width: auto;
}

.producto label {
    flex: 1;
    margin-left: 10px;
}

.precio {
    font-weight: bold;
    color: green;
}

.total {
    font-size: 20px;
    font-weight: bold;
    margin-top: 15px;
    color: green;
}

button {
    width: 100%;
    padding: 15px;
    background: green;
    color: white;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    margin-top: 20px;
    cursor: pointer;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<h1>Hacer Pedido</h1>

<!-- (TODO TU HTML QUEDA IGUAL, NO TOCO NADA DE PRODUCTOS) -->

<div class="total" id="total">Total: $0</div>

<h2>📍 Tus datos</h2>

<input type="text" id="nombre" placeholder="Tu nombre">
<input type="text" id="direccion" placeholder="Dirección">
<input type="text" id="pago" placeholder="Forma de pago">

<button onclick="enviarPedido()">Enviar por WhatsApp</button>
</div>

<script>
let checkboxes = document.querySelectorAll("input[type=checkbox]");

checkboxes.forEach(cb => {
    cb.addEventListener("change", calcularTotal);
});

function calcularTotal() {
    let total = 0;

    checkboxes.forEach(cb => {
        if (cb.checked) {
            total += parseInt(cb.dataset.precio);
        }
    });

    document.getElementById("total").innerText = "Total: $" + total.toLocaleString();
}

function enviarPedido() {
    let mensaje = "Hola! Quiero hacer un pedido:%0A";
    let total = 0;

    checkboxes.forEach(cb => {
        if (cb.checked) {
            let nombre = cb.value;
            let precio = parseInt(cb.dataset.precio);

            mensaje += "- " + nombre + " ($" + precio.toLocaleString() + ")%0A";
            total += precio;
        }
    });

    let nombreCliente = document.getElementById("nombre").value;
    let direccion = document.getElementById("direccion").value;
    let pago = document.getElementById("pago").value;

    mensaje += "%0A Total: $" + total.toLocaleString();
    mensaje += "%0A Nombre: " + nombreCliente;
    mensaje += "%0A Dirección: " + direccion;
    mensaje += "%0A Pago: " + pago;

    let telefono = "5491165679163";

    let url = "https://wa.me/" + telefono + "?text=" + mensaje;

    window.open(url, '_blank');
}
</script>

</body>
</html>
