<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos por WhatsApp</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #333;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

.producto {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 8px 0;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.producto input {
    width: auto;
}

.producto label {
    flex: 1;
    margin-left: 10px;
}

.precio {
    font-weight: bold;
    color: green;
}

.total {
    font-size: 20px;
    font-weight: bold;
    margin-top: 15px;
    color: green;
}

button {
    width: 100%;
    padding: 15px;
    background: green;
    color: white;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    margin-top: 20px;
    cursor: pointer;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<h1>Hacer Pedido</h1>

<h2>🔥 Combos</h2>

<div class="producto"><input type="checkbox" data-precio="15000" value="Salame de campo + queso Mar del Plata"><label>Salame de campo + queso Mar del Plata</label><span class="precio">$15.000</span></div>
<div class="producto"><input type="checkbox" data-precio="20000" value="2 salames de campo + queso Mar del Plata"><label>2 salames de campo + queso Mar del Plata</label><span class="precio">$20.000</span></div>
<div class="producto"><input type="checkbox" data-precio="10000" value="Salame chico + queso Mar del Plata"><label>Salame chico + queso Mar del Plata</label><span class="precio">$10.000</span></div>
<div class="producto"><input type="checkbox" data-precio="10000" value="Salamin Criollo + queso Mar del Plata"><label>Salamin Criollo + queso Mar del Plata</label><span class="precio">$10.000</span></div>
<div class="producto"><input type="checkbox" data-precio="12000" value="2 salamines Criollo + queso Mar del Plata"><label>2 salamines Criollo + queso Mar del Plata</label><span class="precio">$12.000</span></div>
<div class="producto"><input type="checkbox" data-precio="15000" value="3 salamines Criollo + queso Mar del Plata"><label>3 salamines Criollo + queso Mar del Plata</label><span class="precio">$15.000</span></div>
<div class="producto"><input type="checkbox" data-precio="12000" value="Longaniza + queso Mar del Plata"><label>Longaniza + queso Mar del Plata</label><span class="precio">$12.000</span></div>
<div class="producto"><input type="checkbox" data-precio="18000" value="Salame de campo + salamin Criollo + queso"><label>Salame de campo + salamin Criollo + queso</label><span class="precio">$18.000</span></div>
<div class="producto"><input type="checkbox" data-precio="20000" value="Salame de campo + longaniza + queso"><label>Salame de campo + longaniza + queso</label><span class="precio">$20.000</span></div>
<div class="producto"><input type="checkbox" data-precio="15000" value="Mortadela bocha + queso Mar del Plata"><label>Mortadela bocha + queso Mar del Plata</label><span class="precio">$15.000</span></div>
<div class="producto"><input type="checkbox" data-precio="20000" value="Salame de campo + mortadela bocha + queso"><label>Salame de campo + mortadela bocha + queso</label><span class="precio">$20.000</span></div>

<h2>🥩 Fiambres</h2>

<div class="producto"><input type="checkbox" data-precio="10000" value="Salame de campo"><label>Salame de campo</label><span class="precio">$10.000</span></div>
<div class="producto"><input type="checkbox" data-precio="18000" value="2 salames de campo"><label>2 salames de campo</label><span class="precio">$18.000</span></div>
<div class="producto"><input type="checkbox" data-precio="10000" value="Mortadela bocha"><label>Mortadela bocha</label><span class="precio">$10.000</span></div>
<div class="producto"><input type="checkbox" data-precio="18000" value="Mortadela + salame"><label>Mortadela + salame</label><span class="precio">$18.000</span></div>
<div class="producto"><input type="checkbox" data-precio="5000" value="Salamin criollo"><label>Salamin criollo</label><span class="precio">$5.000</span></div>
<div class="producto"><input type="checkbox" data-precio="8000" value="2 salamines criollos"><label>2 salamines criollos</label><span class="precio">$8.000</span></div>
<div class="producto"><input type="checkbox" data-precio="12000" value="3 salamines criollos"><label>3 salamines criollos</label><span class="precio">$12.000</span></div>
<div class="producto"><input type="checkbox" data-precio="8000" value="Longaniza"><label>Longaniza</label><span class="precio">$8.000</span></div>
<div class="producto"><input type="checkbox" data-precio="15000" value="2 longanizas"><label>2 longanizas</label><span class="precio">$15.000</span></div>

<h2>🧀 Quesos</h2>

<div class="producto"><input type="checkbox" data-precio="5000" value="1 porción queso"><label>1 porción queso</label><span class="precio">$5.000</span></div>
<div class="producto"><input type="checkbox" data-precio="9000" value="2 porciones queso"><label>2 porciones queso</label><span class="precio">$9.000</span></div>
<div class="producto"><input type="checkbox" data-precio="8000" value="Queso saborizado"><label>Queso saborizado</label><span class="precio">$8.000</span></div>

<h2>💎 Premium</h2>

<div class="producto"><input type="checkbox" data-precio="20000" value="Salame XXL"><label>Salame XXL</label><span class="precio">$20.000</span></div>
<div class="producto"><input type="checkbox" data-precio="25000" value="Salame XXL + 2 quesos"><label>Salame XXL + 2 quesos</label><span class="precio">$25.000</span></div>
<div class="producto"><input type="checkbox" data-precio="25000" value="Salame XXL + queso saborizado"><label>Salame XXL + queso saborizado</label><span class="precio">$25.000</span></div>

<div class="total" id="total">Total: $0</div>

<h2>📍 Tus datos</h2>

<input type="text" id="nombre" placeholder="Tu nombre">
<input type="text" id="direccion" placeholder="Dirección">
<input type="text" id="pago" placeholder="Forma de pago">

<button onclick="enviarPedido()">Enviar por WhatsApp</button>
</div>

<script>
let checkboxes = document.querySelectorAll("input[type=checkbox]");

checkboxes.forEach(cb => {
    cb.addEventListener("change", calcularTotal);
});

function calcularTotal() {
    let total = 0;

    checkboxes.forEach(cb => {
        if (cb.checked) {
            total += parseInt(cb.dataset.precio);
        }
    });

    document.getElementById("total").innerText = "Total: $" + total.toLocaleString();
}

function enviarPedido() {
    let mensaje = "Hola! Quiero hacer un pedido:%0A";
    let total = 0;

    checkboxes.forEach(cb => {
        if (cb.checked) {
            let nombre = cb.value;
            let precio = parseInt(cb.dataset.precio);

            mensaje += "- " + nombre + " ($" + precio.toLocaleString() + ")%0A";
            total += precio;
        }
    });

    let nombreCliente = document.getElementById("nombre").value;
    let direccion = document.getElementById("direccion").value;
    let pago = document.getElementById("pago").value;

    mensaje += "%0A Total: $" + total.toLocaleString();
    mensaje += "%0A Nombre: " + nombreCliente;
    mensaje += "%0A Dirección: " + direccion;
    mensaje += "%0A Pago: " + pago;

    let telefono = "5491165679163";

    let url = "https://wa.me/" + telefono + "?text=" + mensaje;

    window.open(url, '_blank');
}
</script>

</body>
</html>
